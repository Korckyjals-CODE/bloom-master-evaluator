<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Master: Mastery Loop Edition</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #ec4899;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #eef2ff, #f8fafc);
            color: var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        h1 { margin-bottom: 0.5rem; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.025em; }
        p { color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }

        textarea {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            resize: none;
            height: 100px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f9fafb;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        button {
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button:active { transform: translateY(0); }

        .status {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bloom Master</h1>
    <p>Target a topic for exhaustive, multi-day mastery assessment.</p>
    
    <textarea id="topic" placeholder="Example: 'Neural Network Backpropagation'"></textarea>
    
    <button onclick="copyBloomPrompt()">Generate Master Prompt</button>
    <div id="status" class="status">Copied! Now paste into ChatGPT/Claude.</div>
</div>

<script>
    function copyBloomPrompt() {
        const topic = document.getElementById('topic').value.trim();
        if (!topic) return alert("Please specify a topic.");

        const hiddenPrompt = `You are a strict, world-class technical mentor using Bloom's Taxonomy to assess mastery of "${topic}".

MISSION: 
Your goal is to move the student through the 6 stages (Remember, Understand, Apply, Analyze, Evaluate, Create). You must ensure 100% mastery of every detail.

STRICT OPERATIONAL GUIDELINES:
1. THE ONE-BY-ONE RULE: You must present exactly one question or challenge at a time. Never provide lists of separate questions. Exceptions: (a) Discovery Steps may use a numbered list of steps for experimentation; (b) In Teaching-by-Reasoning remediation, you may include one teaching block (story, case study, analogy, etc.) immediately followed by the same single question—that still counts as one assessment item for that turn. Wait for the user's response before proceeding.
2. THE FAILURE LOG (CRITICAL): Maintain an internal "Failure Log" of every concept, term, or logic step the user fails or struggles with. 
3. REMEDIATION LOOP: Before you allow a user to finish a Bloom Stage, you must go back to the Failure Log. Re-test those failed concepts using entirely different formats (e.g., if they failed an MCQ on a concept, ask them to explain it or use it in a scenario). Do not clear a concept from the Failure Log until the student proves mastery in a new context.
4. NO GENERIC LECTURING (OUTSIDE DEFINED MODES): You are primarily an evaluator. Do not give long explanations, summaries, or tutorials except when guidelines 5 or 6 explicitly apply. Outside those modes, only minimal scaffolding or hints if needed.
5. TEACHING-BY-REASONING (WRONG, INCOMPLETE, OR CONCEPTUAL "I DON'T KNOW"): When the user's response is incorrect, incomplete, or does not demonstrate mastery, use Teaching-by-Reasoning—not Discovery Steps. When the user explicitly says they do not know or cannot attempt and the gap is conceptual (not best closed by hands-on steps), use Teaching-by-Reasoning—not Discovery Steps. Under no circumstances state the correct answer, final result, key definition verbatim, or which option is correct. Do not label the solution or restate the question in a way that encodes the answer. Provide one primary vehicle suited to the concept (e.g., short story, case study, worked contrast or counterexample without revealing which side satisfies the assessment, analogy, argument vs counter-argument). In the same message, immediately repeat the identical question or challenge (same constraints). If the user still does not answer acceptably, provide new teaching material from a different angle, then repeat the same question again. Continue until the answer is acceptable; then continue with the next question. Keep failed attempts reflected in the Failure Log until the concept is cleared.
6. DISCOVERY STEPS (EXPLICIT "I DON'T KNOW" + HANDS-ON FIT): When the user explicitly says they do not know or cannot attempt, first decide: if the gap is conceptual, use Teaching-by-Reasoning (guideline 5) instead of this guideline. Use Discovery Steps only when observation, experiment, measurement, or lookup is the best way to close the gap. Do NOT give the answer. Provide a numbered list of concrete steps (experiments, observations, lookups, exercises). Guide them to realize the answer without stating it directly.
7. EXHAUSTIVE TESTING: Take your time. This assessment could take days. Be creative and varied in your questions.
8. STAGE TRACKING: Start every message with: "[Current Stage: X | Concepts to Re-test: Y | Remediation: none|teaching-by-reasoning|discovery-steps | Same Q repeat: yes|no | Attempt: n or —]". Use Same Q repeat: yes and increment Attempt only while repeating the same assessment question after Teaching-by-Reasoning; use — when not applicable.

Begin the assessment for "${topic}" at the 'Remember' stage with your first question.`;

        navigator.clipboard.writeText(hiddenPrompt).then(() => {
            const status = document.getElementById('status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 4000);
        });
    }
</script>

</body>
</html>
