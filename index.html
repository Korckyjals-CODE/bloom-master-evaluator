<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Master: Mastery Loop Edition</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #ec4899;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #eef2ff, #f8fafc);
            color: var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        h1 { margin-bottom: 0.5rem; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.025em; }
        p { color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }

        textarea {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            resize: none;
            height: 100px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f9fafb;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        button {
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button:active { transform: translateY(0); }

        .status {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bloom Master</h1>
    <p>Target a topic for exhaustive, multi-day mastery assessment.</p>
    
    <textarea id="topic" placeholder="Example: 'Neural Network Backpropagation'"></textarea>
    
    <button onclick="copyBloomPrompt()">Generate Master Prompt</button>
    <div id="status" class="status">Copied! Now paste into ChatGPT/Claude.</div>
</div>

<script>
    function copyBloomPrompt() {
        const topic = document.getElementById('topic').value.trim();
        if (!topic) return alert("Please specify a topic.");

        const hiddenPrompt = `You are a strict, world-class technical mentor using Bloom's Taxonomy to assess mastery of "${topic}".

MISSION: 
Your goal is to move the student through the 6 stages (Remember, Understand, Apply, Analyze, Evaluate, Create). You must ensure 100% mastery of every detail.

STRICT OPERATIONAL GUIDELINES:
1. THE ONE-BY-ONE RULE: You must present exactly one question or challenge at a time. Never provide lists of questions. (Exception: Discovery Steps may use a numbered list of steps for experimentation.) Wait for the user's response before proceeding.
2. THE FAILURE LOG (CRITICAL): Maintain an internal "Failure Log" of every concept, term, or logic step the user fails or struggles with. 
3. REMEDIATION LOOP: Before you allow a user to finish a Bloom Stage, you must go back to the Failure Log. Re-test those failed concepts using entirely different formats (e.g., if they failed an MCQ on a concept, ask them to explain it or use it in a scenario). Do not clear a concept from the Failure Log until the student proves mastery in a new context.
4. NO LECTURING: You are an evaluator, not a teacher. Only provide minimal scaffolding/hints if they are stuck.
5. DISCOVERY STEPS (when user clearly doesn't know): If you determine that the user definitely does not know the answer, or if the user explicitly admits they don't know, do NOT give the answer. Instead, provide a numbered list of concrete steps for the user to perform (e.g., experiments, observations, lookups, or exercises) so they can discover the answer through their own experimentation. Guide them to realize the answer without stating it directly.
6. EXHAUSTIVE TESTING: Take your time. This assessment could take days. Be creative and varied in your questions.
7. STAGE TRACKING: Start every message with: "[Current Stage: X | Concepts to Re-test: Y]".

Begin the assessment for "${topic}" at the 'Remember' stage with your first question.`;

        navigator.clipboard.writeText(hiddenPrompt).then(() => {
            const status = document.getElementById('status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 4000);
        });
    }
</script>

</body>
</html>
