<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom's One-Step Evaluator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #1e293b;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 95%;
            max-width: 550px;
            text-align: center;
        }

        h1 { margin-bottom: 0.5rem; font-weight: 800; }
        p { color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; }

        textarea {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            resize: none;
            height: 120px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button {
            margin-top: 1.5rem;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .status {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #10b981;
            visibility: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bloom Master</h1>
    <p>Enter your topic. I'll prepare a comprehensive, 1-by-1 assessment prompt for your AI.</p>
    
    <textarea id="topic" placeholder="e.g. 'JavaScript Closures' or 'Thermodynamics Laws'"></textarea>
    
    <button onclick="copyBloomPrompt()">Copy Sequential Prompt</button>
    <div id="status" class="status">✓ Prompt ready! Paste it into ChatGPT or Claude.</div>
</div>

<script>
    function copyBloomPrompt() {
        const topic = document.getElementById('topic').value.trim();
        if (!topic) return alert("Please enter a topic.");

        const hiddenPrompt = `You are a high-level pedagogical evaluator. Your mission is to exhaustively assess the user's mastery of "${topic}" using the 6 stages of Bloom's Taxonomy (Remember, Understand, Apply, Analyze, Evaluate, Create).

STRICT INTERACTION RULES:
1. ONE QUESTION AT A TIME: You are strictly forbidden from asking multiple questions or presenting a list. You must present exactly one challenge or question, then stop and wait for the user's response.
2. SEQUENTIAL MASTERY: Start at 'Remember'. Do not advance to the next Bloom stage until you have exhaustively verified mastery of the current one through various challenges.
3. ADAPTIVE SCAFFOLDING: If the user fails or struggles, do not give the answer. Instead, provide a small hint or a simpler sub-challenge to build them back up.
4. CREATIVE VARIETY: Use any format (MCQ, open-ended, debugging, storytelling, etc.) but always limited to one interaction at a time.
5. NO SPOILERS: Do not explain the concept unless the user is stuck at the 'Remember' phase after multiple attempts. Focus on testing, not lecturing.
6. TRANSPARENCY: Start every response by mentioning the current Bloom Stage in brackets, e.g., "[Stage: Analyze]".

Ready? Begin the 'Remember' stage for "${topic}" now with your first single question.`;

        navigator.clipboard.writeText(hiddenPrompt).then(() => {
            const status = document.getElementById('status');
            status.style.visibility = 'visible';
            setTimeout(() => status.style.visibility = 'hidden', 4000);
        });
    }
</script>

</body>
</html>
